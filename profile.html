<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reboot01 Profile — Dashboard</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">Reboot01 Profile</div>
      <div class="actions">
        <button id="logoutBtn" class="btn" type="button">Logout</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="grid">
      <!-- Section 1 -->
      <section class="card">
        <h2>Identity</h2>
        <div class="kv">
          <div class="k">Login</div><div class="v" id="login">—</div>
          <div class="k">User ID</div><div class="v" id="uid">—</div>
        </div>
      </section>

      <!-- Section 2 (NEW) -->
      <section class="card">
        <h2>Audit Ratio</h2>
        <div class="kv">
          <div class="k">Ratio</div><div class="v" id="auditRatio">—</div>
          <div class="k">Up</div><div class="v" id="auditUp">—</div>
          <div class="k">Down</div><div class="v" id="auditDown">—</div>
        </div>
      </section>

      <!-- Section 3 (NEW) -->
      <section class="card">
        <h2>Last Activity</h2>
        <div class="kv">
          <div class="k">When</div><div class="v" id="lastWhen">—</div>
          <div class="k">What</div><div class="v" id="lastWhat">—</div>
        </div>
        <div class="muted" id="lastPath">—</div>
      </section>

      <!-- Extra section (kept as bonus) -->
      <section class="card">
        <h2>Top XP Projects</h2>
        <p class="muted">Highest XP paths from your transactions.</p>
        <ol class="list" id="topProjectsList"></ol>
      </section>

      <!-- Graphs section -->
      <section class="card span2">
        <h2>Statistics (SVG)</h2>

        <div class="charts">
          <!-- Graph 1 (NEW) -->
          <div class="chart-card">
            <div class="chart-title">Audit Ratio (Up vs Down)</div>
            <svg id="auditChart" width="360" height="240" viewBox="0 0 360 240"></svg>
          </div>

          <!-- Graph 2 (NEW) -->
          <div class="chart-card">
            <div class="chart-title">Activity (Last 14 Days)</div>
            <svg id="activityChart" width="760" height="260" viewBox="0 0 760 260"></svg>
          </div>

          <!-- Bonus graph kept -->
          <div class="chart-card span2">
            <div class="chart-title">XP by Project (Top 6)</div>
            <svg id="xpByPathChart" width="760" height="260" viewBox="0 0 760 260"></svg>
          </div>
        </div>

        <div class="muted" id="statusBox"></div>
      </section>
    </div>
  </main>

  <script type="module" src="./profile.js"></script>
</body>
</html>
